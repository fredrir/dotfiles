# Symlinked to ~/.config/hypr/conf.d/local.conf by setup.sh

# --- Scaling (fractional/HiDPI tweaks) ---
env = GDK_SCALE,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR_ROUNDING_POLICY,RoundPreferFloor
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# --- Cursor ---
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,28

# --- Monitor ---
monitor = eDP-1, 1920x1080@60, auto, 1.25
