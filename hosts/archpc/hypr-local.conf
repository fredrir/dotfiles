# Symlinked to ~/.config/hypr/conf.d/local.conf by setup.sh

# --- NVIDIA ---
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# --- Scaling ---
env = GDK_SCALE,1.5

# --- Cursor ---
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

# --- Monitor (adjust connector/resolution to your actual display) ---
monitor = DP-3, 3840x2160@60, 0x0, 1.5
