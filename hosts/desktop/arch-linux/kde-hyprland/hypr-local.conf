# desktop / arch-linux / kde-hyprland  (machine: archpc)
# Symlinked to ~/.config/hypr/conf.d/local.conf by setup.sh (sourced last).
#
# GPU: NVIDIA GeForce RTX 5070 Ti (discrete) + AMD Radeon (integrated).
# The display is driven by the NVIDIA card. If you move it to the AMD iGPU,
# remove the NVIDIA env lines below (and consider AQ_DRM_DEVICES to pick the GPU).

# --- NVIDIA ---
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# --- Cursor (Hyprland session) ---
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

# --- Monitor: Samsung LF27T850, 2560x1440 @ 60Hz, scale 1 ---
# Replace the empty connector with the real name from `hyprctl monitors`
# (e.g. DP-1 / HDMI-A-1) if you add more displays.
monitor = , 2560x1440@60, auto, 1
