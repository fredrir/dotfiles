background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.4
    noise = 0.02
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 280, 45
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(cba6f7cc)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>  Skriv inn passord...</i>
    hide_input = false
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL</i>
    position = 0, -120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hei, $USER
    color = rgb(cdd6f4)
    font_size = 20
    font_family = Work Sans
    position = 0, 180
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(cdd6f4)
    font_size = 72
    font_family = Work Sans
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgb(a6adc8)
    font_size = 16
    font_family = Work Sans
    position = 0, 20
    halign = center
    valign = center
}
