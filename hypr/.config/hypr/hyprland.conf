env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
monitor = DP-3, preferred, auto, 1.5 

cursor {
    no_hardware_cursors = true
}

input {
   kb_layout = no
   sensitivity = 0
   accel_profile = flat
}

bind = SUPER, Return, exec, kitty
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, E, exec, dolphin
bind = SUPER, Space, exec, wofi --show drun
bind = SUPER, Delete, exec, systemctl poweroff
bind = CTRL ALT, T, exec, kitty

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

bind = SUPER CTRL, left, resizeactive, -40 0
bind = SUPER CTRL, right, resizeactive, 40 0
bind = SUPER CTRL, up, resizeactive, 0 -40
bind = SUPER CTRL, down, resizeactive, 0 40

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, B, exec, brave
bind = SUPER, L, exec, hyprlock

bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen
bind = SUPER, Print, exec, grimblast save area ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png

bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, F, fullscreen, 1
bind = SUPER, T, togglefloating
bind = SUPER, P, pseudo
bind = SUPER, J, togglesplit

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = SUPER, F9, exec, hyprsunset -t 5000
bind = SUPER, F10, exec, pkill hyprsunset

bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

exec-once = swaybg -i /home/fredrir/Downloads/wallhaven-6lkrow.png -m fill
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

exec-once = systemd-run --user hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = [workspace special:magic silent] kitty --class scratchterm
windowrule = workspace special:magic silent, match:class scratchterm


bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

workspace = w[t1], border:false, gapsout:0, gapsin:0
workspace = w[tg1], border:false, gapsout:0, gapsin:0

windowrule {
  name = scratchterm
  match:class = scratchterm

  workspace = special:magic silent
  float = on
  size = 1200 700
  center = on
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(89b4faff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(585b70aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    
}

xwayland {
  force_zero_scaling = true
}

decoration {
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        special = true
        popups = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}


misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
