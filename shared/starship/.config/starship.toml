# Starship prompt (https://starship.rs).
# Eastwood-style layout: green [branch] + status, cyan [~/path], bold $.
# Glyphs need a Nerd Font — MesloLGS Nerd Font is set in the Konsole profile.

add_newline = false

# Explicit module list: anything not named here (aws, nodejs, docker, ...)
# never appears in the prompt.
format = '$git_branch$directory$character'
# Slow-command duration sits at the right edge of the terminal instead of
# cluttering the prompt itself.
right_format = '$cmd_duration'

[git_branch]
format = '[\[$branch\]]($style)'
style = 'green'

[directory]
format = '[\[$path\]]($style)'
style = 'cyan'
truncation_length = 8
truncate_to_repo = false

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style)'
style = 'yellow'

# eastwood-style bold $, red when the last command failed.
[character]
success_symbol = '[\$](bold)'
error_symbol = '[\$](bold red)'
