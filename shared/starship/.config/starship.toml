# Starship prompt (https://starship.rs).
# Eastwood-style layout: (.venv) green [ branch] cyan [~/path] bold $.
# Glyphs need a Nerd Font — Hack Nerd Font is set in the Konsole profile.

add_newline = false

# Explicit module list: anything not named here (aws, nodejs, docker, ...)
# never appears in the prompt.
format = '$python$git_branch$directory$character'
# Slow-command duration sits at the right edge of the terminal instead of
# cluttering the prompt itself.
right_format = '$cmd_duration'

# Shown only inside an activated virtualenv, e.g. " (.venv) ". Detection by
# .py/pyproject files is disabled so it never appears without a venv.
[python]
format = '([$symbol\($virtualenv\)]($style))'
symbol = ' '
style = 'yellow'
detect_extensions = []
detect_files = []
detect_folders = []

[git_branch]
format = '[\[$symbol$branch\]]($style)'
symbol = ' '
style = 'green'

[directory]
format = '[\[$path\]]($style)'
style = 'cyan'
truncation_length = 8
truncate_to_repo = false

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style)'
style = 'yellow'

# eastwood-style bold $, red when the last command failed.
[character]
success_symbol = '[\$](bold)'
error_symbol = '[\$](bold red)'
