add_newline = false
palette = 'mocha'

format = '$python$git_branch$directory$character'

right_format = '$cmd_duration'

[python]
format = '([$symbol\($virtualenv\)]($style))'
symbol = ' '
style = 'prompt_python'
detect_extensions = []
detect_files = []
detect_folders = []

[git_branch]
format = '[\[$branch\]]($style)'
style = 'prompt_git'

[directory]
format = '[\[$path\]]($style)'
style = 'prompt_dir'
truncation_length = 8
truncate_to_repo = false

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style)'
style = 'prompt_duration'

[character]
success_symbol = '[\$](prompt_char)'
error_symbol = '[\$](prompt_char)'

# theme:palette
# Generated by scripts/generate-theme.py from theme/palette.toml — do not edit.
[palettes.mocha]
flamingo        = '#f2cdcd'
pink            = '#f5c2e7'
mauve           = '#cba6f7'
red             = '#f38ba8'
peach           = '#fab387'
yellow          = '#f9e2af'
orange          = '#fdbc4b'
green           = '#7cff6b'
teal            = '#1abc9c'
blue            = '#3daee9'
text            = '#cdd6f4'
subtext         = '#bac2de'
overlay         = '#6c7086'
surface2        = '#585b70'
surface1        = '#45475a'
base            = '#1e1e2e'

prompt_python   = '#fdbc4b'
prompt_git      = '#7cff6b'
prompt_dir      = '#1abc9c'
prompt_duration = '#f9e2af'
prompt_char     = '#3daee9'
# theme:palette:end
