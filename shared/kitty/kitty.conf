font_family                    Hack Nerd Font Mono
font_size                      10
symbol_map                     U+E000-U+F8FF Hack Nerd Font Mono

# Colors: generated from theme/palette.toml (scripts/generate-theme.py).
include                        colors-mocha.conf

enabled_layouts                splits:split_axis=horizontal;equalize_on_close=true,stack

# -------------------Appearance-------------------
background_opacity             1.0
window_padding_width           8

# Disable mouse hiding
mouse_hide_wait                0.0

# -------------------Scrolling-------------------
scrollback_lines               100000
scrollback_pager_history_size  1000
mouse_wheel_scrolling          yes
scrollback_smooth              yes
clear_scrollback_on_exit       no

# -------------------Key Bindings-------------------
map ctrl+shift+equal      change_font_size all +2.0
map ctrl+shift+minus      change_font_size all -2.0
map ctrl+shift+backspace  change_font_size all 0

# -------------------Window Management-------------------

# New tab
map ctrl+t                new_tab_with_cwd

# New Split to the right
map ctrl+|                launch --cwd=current --location=vsplit

map alt+n                 new_os_window

map alt+1                 first_window
map alt+2                 second_window
map alt+3                 third_window
map alt+4                 fourth_window
map alt+5                 fifth_window
map alt+6                 sixth_window
map alt+7                 seventh_window
map alt+8                 eighth_window
map alt+9                 ninth_window
map alt+0                 last_window

# -------------------Clipboard-------------------
map ctrl+insert           copy_to_clipboard
map ctrl+v                paste_from_clipboard

# -------------------Tabs and Splits-------------------
