font_family JetBrainsMono Nerd Font
font_size 12
symbol_map U+E000-U+F8FF JetBrainsMono Nerd Font Mono

# Colors: generated from theme/palette.toml (scripts/generate-theme.py).
include colors-mocha.conf

background_opacity 1.0
window_padding_width 8

scrollback_lines 10000
scrollback_pager_history_size 100
mouse_wheel_scrolling yes
scrollback_smooth yes
clear_scrollback_on_exit no

map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0
