"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# -----------------------------------------
[app]
overall = {}


# -----------------------------------------
[mgr]
cwd = { fg = "#83a598", italic = true }

# Find
find_keyword = { fg = "#2C2C2C", bg = "#FABC33", italic = true }
find_position = { fg = "#fe8019", bg = "reset", italic = true }

# Marker
marker_copied = { fg = "#478487", bg = "#478487" }
marker_cut = { fg = "#d3869b", bg = "#d3869b" }
marker_marked = { fg = "#fd7f18", bg = "#fd7f18" }
marker_selected = { fg = "#fabd2f", bg = "#fabd2f" }

# Count
count_copied = { fg = "#282828", bg = "#478487" }
count_cut = { fg = "#282828", bg = "#d3869b" }
count_selected = { fg = "#282828", bg = "#FABC33" }

# Border
border_symbol = " "
border_style = { fg = "#83a598" }
syntect_theme = ""


# -----------------------------------------
[indicator]
parent = { fg = "#82A497" }
current = { fg = "#2C2C2C", bg = "#82A497", bold = true }
preview = { fg = "#82A497" }
padding = { open = "█", close = "█" }


# -----------------------------------------
[tabs]
active = { fg = "#2C2C2C", bg = "#82A497", bold = true, italic = true, underline = true }
inactive = { fg = "#EADAB1", bg = "#2C2C2C", bold = false, underline = true }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }


# -----------------------------------------
[mode]
normal_main = { fg = "#282828", bg = "#83a598", bold = true }
normal_alt = { fg = "#d8c9a4", bg = "#3d3d3d" }
select_main = { fg = "#282828", bg = "#fe8019", bold = true }
select_alt = { fg = "#d8c9a4", bg = "#3d3d3d" }
unset_main = { fg = "#282828", bg = "#b8bb26", bold = true }
unset_alt = { fg = "#d8c9a4", bg = "#3d3d3d" }


# -----------------------------------------
[status]
overall = { fg = "#c8c093", bg = "#32302f" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#504945", bg = "#3c3836" }
progress_error = { fg = "#fb4934", bg = "#3c3836" }

# Permissions
perm_type = { fg = "#c8c093" }
perm_read = { fg = "#83a598" }
perm_write = { fg = "#b8bb26" }
perm_exec = { fg = "#cc241d" }
perm_sep = { fg = "#c8c093" }


# -----------------------------------------
[pick]
border = { fg = "#83a598" }
active = { fg = "#d3869b", bold = true }
inactive = {}


# -----------------------------------------
[input]
border = { fg = "#83a598" }
title = {}
value = {}
selected = { reversed = true }


# -----------------------------------------
[tasks]
border = { fg = "#83a598" }
title = {}
hovered = { underline = true }


# -----------------------------------------
[which]
cols = 3
mask = { bg = "#3c3836" }
cand = { fg = "#83a598" }
rest = { fg = "#928374" }
desc = { fg = "#fe8019" }
separator = "  "
separator_style = { fg = "#83a598" }


# -----------------------------------------
[help]
on = { fg = "#83a598" }
run = { fg = "#d3869b" }
desc = { fg = "#928374" }
hovered = { reversed = true, bold = true }
footer = { fg = "#3c3836", bg = "#a89984" }


# -----------------------------------------
[notify]
title_info = { fg = "#83a598" }
title_warn = { fg = "#fbf1c7" }
title_error = { fg = "#d3869b" }


# -----------------------------------------
[confirm]
border = { fg = "#83a598" }
title = { fg = "#83a598" }
body = { fg = "#fbf1c7" }
list = { fg = "#ebdbb2" }
btn_yes = { reversed = true, fg = "#83a598" }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]


# -----------------------------------------
[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#d3869b" },

  # Media
  { mime = "{audio,video}/*", fg = "#fabd2f" },

  # Archives
  { mime = "application/*zip", fg = "#fb4934" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#fb4934" },

  # Documents
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#82A497" },

  # Fallback
  { url = "*/", fg = "#82A497" },
  { url = "*", fg = "#ebdbb2" },
]

# -----------------------------------------
[spot]
border = { fg = "#83a598" }
title = { fg = "#83a598" }
tbl_col = { fg = "#83a598", bold = true }
tbl_cell = { fg = "#ebdbb2" }


# -----------------------------------------
[cmp]
border = { fg = "#83a598" }
active = { reversed = true, fg = "#83a598" }
inactive = { fg = "#ebdbb2" }
icon_file = ""
icon_folder = ""
icon_command = ""

[icon]
dirs = []
prepend_conds = [{ if = "dir", text = "", fg = "#82A497" }]
prepend_dirs = [
  { name = "Desktop", text = "", fg = "#82A497" },
  { name = "Downloads", text = "", fg = "#82A497" },
  { name = "Documents", text = "", fg = "#82A497" },
  { name = "Music", text = "", fg = "#82A497" },
  { name = "Pictures", text = "", fg = "#82A497" },
  { name = "Videos", text = "", fg = "#82A497" },
  { name = "Books", text = "", fg = "#82A497" },
  { name = "Arch-dotfiles", text = "", fg = "#82A497" },
  { name = "Project", text = "", fg = "#82A497" },

]
