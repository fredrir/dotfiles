# Universal Wayland env for every Hyprland machine. GPU/scale-specific vars live
# in ~/.config/hypr/conf.d/local.conf (from linux/hyprland/overrides/<machine>, sourced last).
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt6ct
