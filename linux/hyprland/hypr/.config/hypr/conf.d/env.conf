# Universal Wayland env for every Hyprland host. Host/GPU/scale-specific vars live
# in ~/.config/hypr/conf.d/local.conf (from hosts/<host>/hypr-local.conf, sourced last).
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt6ct
