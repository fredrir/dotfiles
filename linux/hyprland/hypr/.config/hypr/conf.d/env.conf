# Universal Wayland environment shared by every Hyprland host.
#
# Host/GPU/scale-specific vars — NVIDIA backends, GDK_SCALE, cursor theme/size,
# fractional-scaling tweaks — live in the per-host override at
# ~/.config/hypr/conf.d/local.conf (symlinked from hosts/<host>/hypr-local.conf,
# sourced last by hyprland.conf so it wins).
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt6ct
