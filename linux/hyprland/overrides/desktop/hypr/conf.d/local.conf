# desktop / arch-linux / kde-hyprland (archpc) — symlinked to conf.d/local.conf, sourced last.
# Display driven by the NVIDIA RTX 5070 Ti; drop the NVIDIA env lines to use the AMD iGPU.

# --- NVIDIA ---
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# --- Cursor ---
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

# --- Monitor: Samsung LF27T850 1440p@60 ---
monitor = , 2560x1440@60, auto, 1
